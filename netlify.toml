[build]
  # The directory to run the build command from
  base = "frontend"
  # Force install dev dependencies then build
  command = "npm install --include=dev && npm run build"
  # The directory to publish (changed from .next to out for static export)
  publish = ".next"

[build.environment]
  NEXT_USE_NETLIFY_EDGE = "true"
  NODE_VERSION = "20"  # Specify Node version for consistency

## Use Next.js plugin for dynamic routes
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all requests to Next.js for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Configure branch deploys
[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "production" }
