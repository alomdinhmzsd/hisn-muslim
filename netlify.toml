[build]
  # The directory to run the build command from
  base = "frontend"
  # The command to run your build
  command = "npm run build"
  # The directory to publish
  publish = ".next"

[build.environment]
  NEXT_USE_NETLIFY_EDGE = "true"

# Optional: Configure branch deploys
[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "production" }

# The Next.js plugin is automatically installed by Netlify
# No need to add it manually
